<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Detail Page</title>

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }

   
    .moviePic {
      height: 400px;
      width: 300px;
      opacity: 0.9;
      margin-top: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

   
    .movieDetail {
      position: relative;
      top: 30px;
      width: 60%;
      margin: auto;
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  
  <img src="https://via.placeholder.com/300x400" alt="Movie Poster" class="moviePic">

  
  <p class="movieDetail">
    This movie is an epic story of adventure, emotions, and thrilling action. 
    It takes you on a journey where courage meets destiny. A perfect blend of drama, 
    suspense, and entertainment that keeps you engaged till the end.
  </p>

</body>
</html>
